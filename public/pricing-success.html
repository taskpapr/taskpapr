<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>taskpapr — you're all set</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8; color: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      text-align: center;
    }
    .card {
      background: #faf7f2; border: 1px solid #ddd6c8;
      border-radius: 12px; padding: 48px 40px;
      max-width: 420px; width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p { font-size: 15px; color: #555; line-height: 1.55; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      padding: 12px 28px; border-radius: 8px;
      background: #2c5f8a; color: white;
      font-size: 15px; font-weight: 600; font-family: inherit;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #245077; }
    .logo {
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 14px; color: #aaa; margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>You're all set.</h1>
    <p>Welcome to taskpapr Solo. Your subscription is active — everything you need to stay on top of your tasks is ready and waiting.</p>
    <a href="/" class="btn">Go to your board →</a>
  </div>
  <div class="logo">taskpapr</div>
</body>
</html>
