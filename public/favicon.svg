<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper background -->
  <rect x="4" y="2" width="20" height="26" rx="2" ry="2" fill="#faf7f2" stroke="#c8b89a" stroke-width="1.5"/>
  <!-- Folded corner -->
  <path d="M20 2 L24 6 L20 6 Z" fill="#ddd6c8"/>
  <path d="M20 2 L24 6 L20 6 Z" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Task lines -->
  <line x1="8" y1="11" x2="20" y2="11" stroke="#2c5f8a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Strikethrough on first line (done task) -->
  <line x1="8" y1="11" x2="20" y2="11" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="7.5" y1="11" x2="20.5" y2="11" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <!-- Second task line -->
  <line x1="8" y1="16" x2="18" y2="16" stroke="#555" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Third task line (shorter) -->
  <line x1="8" y1="21" x2="15" y2="21" stroke="#555" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>