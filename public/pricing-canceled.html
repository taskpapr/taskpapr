<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>taskpapr — checkout canceled</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8; color: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      text-align: center;
    }
    .card {
      background: #faf7f2; border: 1px solid #ddd6c8;
      border-radius: 12px; padding: 48px 40px;
      max-width: 420px; width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p { font-size: 15px; color: #555; line-height: 1.55; margin-bottom: 28px; }
    .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 11px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      text-decoration: none; border: 1px solid #ddd6c8;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: #2c5f8a; color: white; border-color: #2c5f8a; }
    .btn-primary:hover { background: #245077; }
    .btn-secondary { background: #faf7f2; color: #444; }
    .btn-secondary:hover { background: #f0ebe0; }
    .logo {
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 14px; color: #aaa; margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <h1>No problem.</h1>
    <p>Checkout was canceled. Your trial is still active — no charge was made. Come back whenever you're ready.</p>
    <div class="btns">
      <a href="/pricing" class="btn btn-primary">View pricing</a>
      <a href="/" class="btn btn-secondary">← Back to board</a>
    </div>
  </div>
  <div class="logo">taskpapr</div>
</body>
</html>
