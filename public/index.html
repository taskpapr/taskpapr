<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taskpapr</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-title">taskpapr <span class="app-version" id="app-version"></span><span class="sync-stamp" id="sync-stamp"></span></div>
    <div class="header-actions">
      <button class="btn-ghost" id="btn-search" title="Search tasks (⌘K)">🔍 Search</button>

      <!-- Bookmarks dropdown -->
      <div class="bookmark-menu" id="bookmark-menu">
        <button class="btn-ghost" id="btn-bookmarks" title="Bookmarks">🔖 Views</button>
        <div class="bookmark-dropdown hidden" id="bookmark-dropdown">
          <div class="bookmark-dropdown-header">
            <span class="bookmark-dropdown-title">Saved Views</span>
            <button class="bookmark-save-btn" id="btn-save-bookmark" title="Save current view">+ Save view</button>
          </div>
          <div class="bookmark-list" id="bookmark-list">
            <!-- populated by JS -->
          </div>
          <div class="bookmark-empty hidden" id="bookmark-empty">
            No saved views yet. Click "+ Save view" to save the current canvas position.
          </div>
        </div>
      </div>

      <button class="btn-ghost" id="btn-today" title="Show/hide Today tile (D)">📅 <span id="today-task-count"></span></button>
      <button class="btn-ghost" id="btn-goals" title="Show/hide goal tiles (G)">⊙ Goals</button>
      <button class="btn-ghost" id="btn-toggle-hidden" title="Show/hide parked tiles" style="display:none">🗃 <span id="hidden-tile-count"></span></button>
      <button class="btn-ghost" id="btn-add-column" title="Add tile">+ Tile</button>
      <button class="btn-ghost danger" id="btn-clear-all" title="Clear all completed tasks">✕ Clear done</button>
      <div class="user-menu" id="user-menu">
        <div class="user-trigger" id="user-trigger">
          <div class="user-avatar-wrap">
            <img class="user-avatar" id="user-avatar" src="" alt="" style="display:none"/>
            <div class="user-initials" id="user-initials"></div>
          </div>
          <span class="user-display-name" id="user-display-name"></span>
        </div>
        <div class="user-dropdown hidden" id="user-dropdown">
          <div class="user-name" id="user-name"></div>
          <a href="/goals">⊙ Goals</a>
          <a href="/settings">⚙ Settings</a>
          <a href="/admin" id="admin-link" class="hidden">Admin</a>
          <div id="trial-countdown" style="display:none"></div>
          <form method="POST" action="/auth/logout" id="logout-form"><button type="submit">Sign out</button></form>
        </div>
      </div>
    </div>
  </header>

  <!-- Canvas viewport -->
  <div class="board-viewport" id="board-viewport">
    <div class="board-canvas" id="board-canvas"></div>
    <!-- Off-screen content beacons — appear when tiles exist outside the visible area -->
    <div id="beacon-top"    class="offscreen-beacon beacon-top    beacon-hidden"><span class="beacon-arrow">↑</span><span class="beacon-count"></span></div>
    <div id="beacon-bottom" class="offscreen-beacon beacon-bottom beacon-hidden"><span class="beacon-arrow">↓</span><span class="beacon-count"></span></div>
    <div id="beacon-left"   class="offscreen-beacon beacon-left   beacon-hidden"><span class="beacon-arrow">←</span><span class="beacon-count"></span></div>
    <div id="beacon-right"  class="offscreen-beacon beacon-right  beacon-hidden"><span class="beacon-arrow">→</span><span class="beacon-count"></span></div>
  </div>

  <!-- Zoom indicator -->
  <div class="zoom-indicator" id="zoom-indicator">
    <button id="btn-zoom-out" title="Zoom out">−</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in" title="Zoom in">+</button>
    <button id="btn-zoom-reset" title="Reset view">⌂</button>
  </div>

  <!-- Task context menu -->
  <div class="context-menu hidden" id="context-menu">
    <button data-action="properties">Properties…</button>
    <hr />
    <button data-action="wip">Mark WIP</button>
    <button data-action="ack">✓ Touch</button>
    <button data-action="snooze">💤 Snooze 24h</button>
    <button data-action="park">🗃 Park task</button>
    <hr />
    <button data-action="today">📅 Add to Today</button>
    <button data-action="assign-goal">Assign Goal…</button>
    <button data-action="colour">Set colour…</button>
    <hr />
    <button data-action="delete" class="danger">Delete</button>
  </div>

  <!-- Goal picker -->
  <div class="context-menu hidden" id="goal-picker"></div>

  <!-- Task detail / notes panel -->
  <div class="notes-panel hidden" id="notes-panel">
    <div class="notes-panel-header">
      <span class="notes-panel-label">Task</span>
      <button class="btn-close notes-panel-close" id="notes-panel-close" title="Close (Esc)">✕</button>
    </div>
    <div class="notes-panel-body">
      <input type="text" class="notes-title-input" id="notes-title-input" placeholder="Task title…" autocomplete="off" />
      <!-- Goal assignment -->
      <div class="notes-field notes-field--goal">
        <label class="notes-field-label">Goal</label>
        <select class="notes-recurrence-select" id="notes-goal-select">
          <option value="">— none —</option>
        </select>
      </div>
      <!-- Inline colour swatches -->
      <div class="notes-field notes-field--colour">
        <label class="notes-field-label">Colour</label>
        <div class="notes-colour-swatches" id="notes-colour-swatches"></div>
      </div>
      <div class="notes-schedule-row">
        <div class="notes-field">
          <label class="notes-field-label">Due date</label>
          <input type="date" class="notes-date-input" id="notes-date-input" />
        </div>
        <div class="notes-field">
          <label class="notes-field-label">Repeat</label>
          <select class="notes-recurrence-select" id="notes-recurrence-select">
            <option value="">— none —</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="2w">Every 2 weeks</option>
            <option value="monthly">Monthly</option>
            <option value="2m">Every 2 months</option>
            <option value="3m">Every 3 months</option>
          </select>
        </div>
      </div>
      <div class="notes-field notes-field--visibility" id="notes-visibility-field" style="display:none">
        <label class="notes-field-label">Show task</label>
        <select class="notes-recurrence-select" id="notes-visibility-select">
          <option value="-1">Always visible</option>
          <option value="0">Day of deadline</option>
          <option value="1">1 day before due</option>
          <option value="3" selected>3 days before due</option>
          <option value="7">7 days before due</option>
          <option value="14">14 days before due</option>
          <option value="30">30 days before due</option>
        </select>
      </div>
      <div class="notes-rot-row">
        <label class="notes-no-rot-label">
          <input type="checkbox" id="notes-no-rot-check" />
          <span>Remind me if untouched</span>
        </label>
        <select class="notes-recurrence-select notes-rot-speed" id="notes-rot-interval-select" style="display:none">
          <option value="1d">Daily</option>
          <option value="weekly" selected>Weekly</option>
          <option value="2w">Every 2 weeks</option>
          <option value="monthly">Monthly</option>
          <option value="3m">Every 3 months</option>
        </select>
      </div>
      <span class="notes-touched-info" id="notes-touched-info"></span>
      <div class="notes-divider"></div>
      <div class="notes-field notes-field--notes">
        <label class="notes-field-label">Notes</label>
        <textarea class="notes-textarea" id="notes-textarea" placeholder="Add notes… (Markdown supported)"></textarea>
      </div>
      <div class="notes-field notes-field--preview">
        <label class="notes-field-label">Preview</label>
        <div class="notes-preview" id="notes-preview"></div>
      </div>
    </div>
    <div class="notes-panel-footer">
      <span class="notes-save-status" id="notes-save-status"></span>
      <button class="btn-panel-secondary" id="btn-find-on-board" title="Pan to this task on the board">◎ Find</button>
      <button class="btn-panel-secondary" id="btn-park-task" title="Park task to Someday/Maybe">🗃 Park</button>
      <button class="btn-ack" id="btn-ack" title="Reset rot — mark as touched without editing">✓ Touch</button>
    </div>
  </div>

  <!-- Add column modal -->
  <div class="overlay hidden" id="column-modal">
    <div class="overlay-panel narrow">
      <div class="overlay-header">
        <h2>New Tile</h2>
        <button class="btn-close" id="btn-close-column-modal">✕</button>
      </div>
      <form id="add-column-form">
        <input type="text" id="new-column-input" placeholder="Tile name…" autocomplete="off" />
        <button type="submit">Create</button>
      </form>
    </div>
  </div>

  <!-- Search overlay -->
  <div class="search-overlay hidden" id="search-overlay">
    <div class="search-box">
      <div class="search-input-row">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Search tasks…" autocomplete="off" spellcheck="false" />
        <kbd class="search-esc-hint">Esc</kbd>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
