name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start server (background)
        run: |
          node server.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to be ready (up to 15s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3033/api/me > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        run: bash test/smoke.sh http://localhost:3033

      - name: Run bookmarks migration test
        run: node test/migration-bookmarks.js

      - name: Run API integration tests
        run: bash test/integration-api.sh http://localhost:3033

      - name: npm audit (high/critical fail CI)
        run: npm audit --audit-level=high

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64 only for PR/push — multi-arch on release)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: taskpapr:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskpapr:latest
            ghcr.io/${{ github.repository_owner }}/taskpapr:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max